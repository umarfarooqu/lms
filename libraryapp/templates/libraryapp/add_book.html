{% extends "libraryapp/base.html" %}

{% block content %}
<section class="mx-auto max-w-2xl overflow-hidden rounded-2xl bg-white shadow-lg ring-1 ring-slate-200">
  <div class="bg-gradient-to-r from-blue-700 to-cyan-600 px-6 py-5 text-white">
    <p class="text-xs uppercase tracking-[0.14em] text-cyan-100">Module 1</p>
    <h2 class="mt-1 text-2xl font-bold">Add New Book</h2>
    <p class="mt-1 text-sm text-cyan-50">Create a new library record with auto-generated barcode number.</p>
  </div>

  <form method="post" class="space-y-5 p-6">
    {% csrf_token %}
    <div>
      <label class="text-sm font-semibold text-slate-700">Book Title</label>
      <input type="text" name="title" required class="mt-1.5 w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2.5 outline-none transition focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200" placeholder="Atomic Habits">
    </div>
    <div>
      <label class="text-sm font-semibold text-slate-700">Author Name</label>
      <input type="text" name="author" required class="mt-1.5 w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2.5 outline-none transition focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200" placeholder="James Clear">
    </div>
    <p class="rounded-xl border border-blue-100 bg-blue-50 px-3 py-2 text-xs text-blue-700">Barcode number will be auto-generated. Each entry is saved as a single copy.</p>

    <button class="w-full rounded-xl bg-blue-700 px-4 py-3 font-semibold text-white shadow-sm transition hover:-translate-y-0.5 hover:bg-blue-600">Save Book</button>
  </form>
</section>
{% endblock %}
