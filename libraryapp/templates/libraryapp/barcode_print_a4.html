<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Unused Barcodes A4 Print</title>
  <style>
    @page { size: A4 portrait; margin: 10mm; }
    body { font-family: Arial, sans-serif; margin: 0; color: #111; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8mm; }
    .btn { padding: 8px 12px; border: none; background: #0f4ea8; color: #fff; border-radius: 6px; cursor: pointer; }
    .meta { font-size: 12px; color: #444; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6mm; }
    .label { border: 1px solid #d0d7e2; border-radius: 8px; padding: 4mm; text-align: center; break-inside: avoid; }
    .label img { width: 100%; height: 18mm; object-fit: contain; }
    .code { margin-top: 2mm; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; }
    @media print {
      .topbar { display: none; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h2 style="margin:0 0 6px 0;">Unused Barcodes (A4)</h2>
      <div class="meta">Total unused: {{ total }}</div>
    </div>
    <button class="btn" onclick="window.print()">Print</button>
  </div>

  <div class="grid">
    {% for item in records %}
      <div class="label">
        <img src="{{ item.barcode_url }}" alt="{{ item.code }}">
        <div class="code">{{ item.code }}</div>
      </div>
    {% empty %}
      <p>No unused barcodes available.</p>
    {% endfor %}
  </div>
</body>
</html>
