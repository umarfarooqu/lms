{% extends "libraryapp/base.html" %}

{% block content %}
<section class="mx-auto max-w-2xl overflow-hidden rounded-2xl bg-white shadow-lg ring-1 ring-slate-200">
  <div class="bg-gradient-to-r from-amber-600 to-orange-500 px-6 py-5 text-white">
    <p class="text-xs uppercase tracking-[0.14em] text-amber-100">Module 2</p>
    <h2 class="mt-1 text-2xl font-bold">Issue Book</h2>
    <p class="mt-1 text-sm text-amber-50">Assign selected book to student with active issue tracking.</p>
  </div>

  <form method="post" class="space-y-5 p-6">
    {% csrf_token %}
    <div>
      <label class="text-sm font-semibold text-slate-700">Select Book</label>
      <select name="book" required class="mt-1.5 w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2.5 outline-none transition focus:border-amber-500 focus:bg-white focus:ring-2 focus:ring-amber-200">
        <option value="">Select book</option>
        {% for b in issue_form.fields.book.queryset %}
        <option value="{{ b.id }}">{{ b.book_code }} - {{ b.title }} ({{ b.available_copies }} left)</option>
        {% endfor %}
      </select>
    </div>

    <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 space-y-4">
      <p class="text-xs font-bold uppercase tracking-widest text-amber-600">Student Details</p>
      <div>
        <label class="text-sm font-semibold text-slate-700">Student Name</label>
        <input type="text" name="student_name" class="mt-1.5 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 outline-none transition focus:border-amber-500 focus:ring-2 focus:ring-amber-200" placeholder="Rahul Kumar">
      </div>
      <div>
        <label class="text-sm font-semibold text-slate-700">Student ID</label>
        <input type="text" name="student_id" class="mt-1.5 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 outline-none transition focus:border-amber-500 focus:ring-2 focus:ring-amber-200" placeholder="STU1024">
      </div>
    </div>

    <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 space-y-4">
      <p class="text-xs font-bold uppercase tracking-widest text-blue-600">Employee Details</p>
      <div>
        <label class="text-sm font-semibold text-slate-700">Employee Name</label>
        <input type="text" name="employee_name" class="mt-1.5 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200" placeholder="Ahmed Ali">
      </div>
      <div>
        <label class="text-sm font-semibold text-slate-700">Employee ID</label>
        <input type="text" name="employee_id" class="mt-1.5 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200" placeholder="EMP101">
      </div>
    </div>

    <p class="text-xs text-slate-400">* Fill either Student or Employee section (or both if needed).</p>
    <button class="w-full rounded-xl bg-slate-900 px-4 py-3 font-semibold text-white shadow-sm transition hover:-translate-y-0.5 hover:bg-slate-700">Issue Book</button>
  </form>
</section>
{% endblock %}
