{% extends "libraryapp/base.html" %}

{% block content %}
<section class="mx-auto max-w-2xl overflow-hidden rounded-2xl bg-white shadow-lg ring-1 ring-slate-200">
  <div class="bg-gradient-to-r from-emerald-600 to-teal-500 px-6 py-5 text-white">
    <p class="text-xs uppercase tracking-[0.14em] text-emerald-100">Module 3</p>
    <h2 class="mt-1 text-2xl font-bold">Return Book</h2>
    <p class="mt-1 text-sm text-emerald-50">Close issue record using book unique number and student ID.</p>
  </div>

  <form method="post" class="space-y-5 p-6">
    {% csrf_token %}
    <div>
      <label class="text-sm font-semibold text-slate-700">Book Unique No</label>
      <input type="text" name="book_code" required class="mt-1.5 w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2.5 outline-none transition focus:border-emerald-500 focus:bg-white focus:ring-2 focus:ring-emerald-200" placeholder="18000000001">
    </div>
    <div>
      <label class="text-sm font-semibold text-slate-700">Student ID</label>
      <input type="text" name="student_id" class="mt-1.5 w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2.5 outline-none transition focus:border-emerald-500 focus:bg-white focus:ring-2 focus:ring-emerald-200" placeholder="STU1024">
    </div>
    <div class="flex items-center gap-2 text-slate-400 text-sm">
      <div class="flex-1 border-t border-slate-200"></div>
      <span>or</span>
      <div class="flex-1 border-t border-slate-200"></div>
    </div>
    <div>
      <label class="text-sm font-semibold text-slate-700">Employee ID</label>
      <input type="text" name="employee_id" class="mt-1.5 w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2.5 outline-none transition focus:border-emerald-500 focus:bg-white focus:ring-2 focus:ring-emerald-200" placeholder="EMP101">
    </div>

    <button class="w-full rounded-xl bg-emerald-600 px-4 py-3 font-semibold text-white shadow-sm transition hover:-translate-y-0.5 hover:bg-emerald-500">Return Book</button>
  </form>
</section>
{% endblock %}
